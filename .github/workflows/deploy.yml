name: Deploy to GCP

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  GCP_REGION: asia-northeast1
  SERVICE_NAME: kskphotos
  IMAGE_NAME: kskphotos

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      # --- GCP 認証 (Workload Identity Federation) ---
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # public/uploads は gitignore のため、写真ファイルは GCS から取得して
      # イメージに焼き込む（マスターは gs://kskphotos-photos/uploads）
      - name: Sync photo assets from GCS
        run: |
          mkdir -p public/uploads
          gcloud storage rsync gs://kskphotos-photos/uploads public/uploads --recursive

      # --- Artifact Registry に Docker イメージを push ---
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ISR ページが generateStaticParams でビルド時に DB を参照するため、
      # Auth Proxy を TCP で立てて --network=host のビルドから接続する
      - name: Start Cloud SQL Auth Proxy
        run: |
          curl -sLo /tmp/cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64
          chmod +x /tmp/cloud-sql-proxy
          CONNECTION_NAME=$(gcloud secrets versions access latest --secret=kskphotos-database-url | sed -n 's|.*host=/cloudsql/||p')
          /tmp/cloud-sql-proxy --port 5432 "$CONNECTION_NAME" &
          sleep 3

      # スキーマ変更を本番 DB へ反映してからビルド（generateStaticParams /
      # ISR が新フィールドを参照するため、ビルド前に同期が必要）。
      # 追加のみ(非破壊)の変更を db push で同期。--accept-data-loss は付けず、
      # 破壊的変更は意図的に失敗させる（誤ってデータを落とさないガード）。
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies & generate client
        run: |
          npm ci
          npx prisma generate

      - name: Sync DB schema and service menu (additive, non-destructive)
        run: |
          DB_URL=$(gcloud secrets versions access latest --secret=kskphotos-database-url \
            | sed -e 's|@localhost/|@localhost:5432/|' -e 's|?host=/cloudsql/.*||')
          DATABASE_URL="$DB_URL" npx prisma db push
          DATABASE_URL="$DB_URL" npx tsx prisma/seed-services.ts

      - name: Build Docker image
        run: |
          BUILD_DATABASE_URL=$(gcloud secrets versions access latest --secret=kskphotos-database-url \
            | sed -e 's|@localhost/|@localhost:5432/|' -e 's|?host=/cloudsql/.*||')
          docker build --network=host \
            --build-arg DATABASE_URL="$BUILD_DATABASE_URL" \
            --build-arg NEXT_PUBLIC_GA_ID="${{ vars.NEXT_PUBLIC_GA_ID }}" \
            -t ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Push Docker image
        run: |
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.IMAGE_NAME }}:latest

      # --- Cloud Run にデプロイ ---
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Show deployed URL
        run: |
          echo "Deployed to: $(gcloud run services describe ${{ env.SERVICE_NAME }} --region=${{ env.GCP_REGION }} --format='value(status.url)')"
